name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml
  pull_request:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint backend
        run: npx eslint "{src,test}/**/*.ts"

      - name: Run tests
        run: npm run test

      - name: Build backend
        run: npm run build
