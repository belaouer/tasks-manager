services:
  postgres:
    image: postgres:16-alpine
    container_name: tasks-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tasks_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tasks_manager"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    container_name: tasks-manager-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    environment:
      PERSISTENCE_DRIVER: prisma
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tasks_manager
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
